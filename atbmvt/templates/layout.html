{% load static %}
<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Сайт Django</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
        <link rel="stylesheet" href="{% static 'css/style.css' %}">
        <link href="https://unpkg.com/filepond/dist/filepond.css" rel="stylesheet">
        <link href="https://unpkg.com/filepond-plugin-image-preview/dist/filepond-plugin-image-preview.css" rel="stylesheet">
    </head>
    <body>
        <header data-bs-theme="dark">
            <nav class="navbar navbar-expand-md navbar-dark fixed-top bg-dark">
                <div class="container">
                    <button class="navbar-toggler" type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#navbarCollapse"
                        aria-controls="navbarCollapse"
                        aria-expanded="false"
                        aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarCollapse">
                        <ul class="navbar-nav me-auto mb-2 mb-md-0">
                            <li class="nav-item">
                                <a class="nav-link active" aria-current="page"
                                    href="#">Home</a>
                            </li>
                             <li class="nav-item">
                                <a class="nav-link active" aria-current="page"
                                    href="/categories/add">Add category</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link active" aria-current="page"
                                    href="/categories">All categories</a>
                            </li>
                        </ul>
                        {%if not user.is_authenticated%}
                        <ul class="navbar-nav">
                            <li class="nav-item">
                                <a class="nav-link" href="/users/register">Реєструватися</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="/users/login">Вхід</a>
                            </li>
                        </ul>
                        {%else%}
                        <ul class="navbar-nav">
                            <li class="nav-item">
                                <a class="nav-link" href="/users/profile">Привіт! {{user.username}}</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="/users/logout">Вийти</a>
                            </li>
                        </ul>
                        {%endif%}
                    </div>
                </div>
            </nav>
        </header>

        <div class="container">
            {% block content %}
            {% endblock %}
        </div>

        <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>

        <script src="https://unpkg.com/filepond/dist/filepond.js"></script>
        <script src="https://unpkg.com/filepond-plugin-image-preview/dist/filepond-plugin-image-preview.js"></script>
    </body>
</html>
