{% extends "layout.html" %}

{% block content %}

<div class="d-flex justify-content-center align-items-center vh-100">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-xl-5">

                <div class="card shadow-lg p-4">
                    <div class="card-header text-center bg-white border-0 mb-3">
                        <h2 class="fw-bold">Email Sent</h2>
                    </div>

                    <div class="card-body text-center">
                        <p class="text-muted mb-4">
                            If an account with the email you entered exists, we’ve sent instructions to reset your password.  
                            Please check your inbox and follow the link.
                        </p>

                        <a href="{% url 'users:login' %}" class="btn btn-primary btn-lg w-100">
                            ← Back to login
                        </a>
                    </div>

                </div>

            </div>
        </div>
    </div>
</div>

{% endblock %}
